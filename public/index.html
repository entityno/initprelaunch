<!DOCTYPE html>
<html lang="en" style="background:#000000 !important;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<title>The Initiative — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    color-scheme: dark;
    --ink: #f0ece4;
    --paper: #000000;
    --accent: #e63946;
    --muted: #6b6b6b;
    --rule: #2a2a2a;
  }

  html { font-size: 16px; background: #000000 !important; background-color: #000000 !important; }

  body {
    background: #000000 !important;
    background-color: #000000 !important;
    color: var(--ink);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    position: relative;
  }

  /* No grain overlay on dark mode */

  /* Top rule bar */
  .top-bar {
    width: 100%;
    padding: 1rem 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    animation: fadeDown 1s ease 0.2s both;
  }

  .top-bar .dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 3rem 2rem;
    position: relative;
  }

  /* Decorative vertical lines */
  .main::before,
  .main::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--rule);
  }
  .main::before { left: 4rem; }
  .main::after { right: 4rem; }

  /* Title block */
  .title-block {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeUp 1.2s ease 0.5s both;
  }

  .the-label {
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 400;
    font-size: clamp(0.85rem, 1.5vw, 1rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(4rem, 12vw, 10rem);
    line-height: 0.9;
    letter-spacing: -0.03em;
    position: relative;
    display: inline-block;
  }

  .title .i-dot {
    color: var(--accent);
  }

  /* Horizontal rule under title */
  .title-rule {
    width: 60px;
    height: 3px;
    background: var(--accent);
    margin: 2rem auto;
    animation: expandWidth 0.8s ease 1s both;
  }

  /* Watch this space */
  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0.02em;
    margin-bottom: 3.5rem;
    animation: fadeUp 1s ease 1.2s both;
    position: relative;
  }

  .tagline::before,
  .tagline::after {
    content: '—';
    margin: 0 0.6em;
    color: var(--rule);
  }

  /* Countdown */
  .countdown {
    display: flex;
    gap: clamp(1rem, 4vw, 3rem);
    animation: fadeUp 1s ease 1.5s both;
  }

  .countdown-unit {
    text-align: center;
    position: relative;
  }

  .countdown-unit:not(:last-child)::after {
    content: ':';
    position: absolute;
    right: calc(-0.5 * clamp(1rem, 4vw, 3rem) - 0.2em);
    top: 0.15em;
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--rule);
    font-weight: 300;
  }

  .countdown-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 400;
    line-height: 1;
    color: var(--ink);
    min-width: 2.2ch;
    display: block;
  }

  .countdown-label {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.6rem;
  }

  /* Launch date */
  .launch-date {
    margin-top: 3rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    animation: fadeUp 1s ease 1.8s both;
    border: 1px solid var(--rule);
    padding: 0.6rem 1.5rem;
    text-align: center;
  }

  .launch-date span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Bottom bar */
  .bottom-bar {
    padding: 1.2rem 2rem;
    border-top: 2px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    animation: fadeUp 0.8s ease 2s both;
    background: #000000;
  }

  .bottom-bar .category-list {
    display: flex;
    gap: 1.5rem;
  }

  .bottom-bar .category-list span {
    position: relative;
  }

  .bottom-bar .category-list span::before {
    content: '•';
    margin-right: 0.6rem;
    color: var(--accent);
  }

  /* Corner marks */
  .corner-mark {
    position: fixed;
    width: 20px;
    height: 20px;
    border-color: var(--rule);
    border-style: solid;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 1s ease 2.5s forwards;
  }
  .corner-mark.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .corner-mark.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner-mark.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .corner-mark.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  .tagline-text {
    display: inline-block;
    transition: opacity 0.6s ease;
  }
  .tagline-text.fade-out {
    opacity: 0;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes expandWidth {
    from { width: 0; }
    to { width: 60px; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .mobile-br { display: block; }

  /* Responsive */
  @media (max-width: 768px) {
    .mobile-br { display: block; }
    .main::before, .main::after { display: none; }
    .top-bar, .bottom-bar { padding: 0.8rem 1.2rem; }
    .bottom-bar .category-list { display: none; }
    .corner-mark { display: none; }
    .main { padding: 2rem 1.2rem; }
  }

  @media (max-width: 480px) {
    .countdown-unit:not(:last-child)::after { display: none; }
    .countdown { gap: 1.2rem; }
  }
</style>
</head>
<body style="background:#000000 !important; background-color:#000000 !important;">

<div class="corner-mark tl"></div>
<div class="corner-mark tr"></div>
<div class="corner-mark bl"></div>
<div class="corner-mark br"></div>

<header class="top-bar">
  <span><span class="dot"></span>&ensp;Pre-launch</span>
</header>

<main class="main">
  <div class="title-block">
    <div class="the-label">The</div>
    <h1 class="title">In<span class="i-dot">i</span>tiative</h1>
  </div>

  <div class="title-rule"></div>

  <p class="tagline">
    <span class="tagline-text" id="tagline">Watch this space</span>
  </p>

  <div class="countdown">
    <div class="countdown-unit">
      <span class="countdown-number" id="days">00</span>
      <span class="countdown-label">Days</span>
    </div>
    <div class="countdown-unit">
      <span class="countdown-number" id="hours">00</span>
      <span class="countdown-label">Hours</span>
    </div>
    <div class="countdown-unit">
      <span class="countdown-number" id="minutes">00</span>
      <span class="countdown-label">Min</span>
    </div>
    <div class="countdown-unit">
      <span class="countdown-number" id="seconds">00</span>
      <span class="countdown-label">Sec</span>
    </div>
  </div>

  <div class="launch-date">Launching <br class="mobile-br"><span>25 May 2026 — 10:00 AM EST</span></div>
</main>

<footer class="bottom-bar">
  <span>&copy; The Initiative 2026</span>
  <div class="category-list">
    <span>Science</span>
    <span>Biotech</span>
    <span>Innovation</span>
    <span>Health</span>
  </div>
</footer>

<script>
  // Force black background
  document.documentElement.style.backgroundColor = '#000000';
  document.body.style.backgroundColor = '#000000';
  
  const target = new Date('2026-05-25T10:00:00-05:00').getTime();

  function pad(n) { return String(n).padStart(2, '0'); }

  function update() {
    const now = Date.now();
    const diff = Math.max(0, target - now);

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById('days').textContent = pad(d);
    document.getElementById('hours').textContent = pad(h);
    document.getElementById('minutes').textContent = pad(m);
    document.getElementById('seconds').textContent = pad(s);
  }

  update();
  setInterval(update, 1000);

  // Multilingual "Watch this space"
  const phrases = [
    'Watch this space',
    '敬请期待',
    'इस जगह पर नज़र रखें',
    'Pendiente de este espacio',
    'Restez à l\'écoute',
    'ترقبوا هذا المكان',
    'এই জায়গায় নজর রাখুন',
    'Fique de olho',
    'Следите за обновлениями',
    '乞うご期待',
    'Nantikan',
    'Bleiben Sie dran',
    'اس جگہ پر نظر رکھیں',
    'Takipte kalın',
    '지켜봐 주세요',
    'Hãy theo dõi',
    'Restate sintonizzati',
    'โปรดติดตาม',
    'Bądź na bieżąco',
    'Endelea kufuatilia',
    'Følg med her',
    'Håll utkik',
    'Hold øje med dette',
    'Pysy kuulolla',
    'Fylgist með'
  ];

  let phraseIndex = 0;
  const taglineEl = document.getElementById('tagline');
  const taglineContainer = taglineEl.parentElement;

  // Measure all phrases and lock height to the tallest
  (function lockTaglineHeight() {
    const original = taglineEl.textContent;
    taglineContainer.style.minHeight = 'auto';
    let maxH = 0;
    phrases.forEach(p => {
      taglineEl.textContent = p;
      maxH = Math.max(maxH, taglineContainer.offsetHeight);
    });
    taglineEl.textContent = original;
    taglineContainer.style.minHeight = maxH + 'px';
    window.addEventListener('resize', lockTaglineHeight);
  })();

  setInterval(() => {
    taglineEl.classList.add('fade-out');
    setTimeout(() => {
      phraseIndex = (phraseIndex + 1) % phrases.length;
      taglineEl.textContent = phrases[phraseIndex];
      taglineEl.classList.remove('fade-out');
    }, 600);
  }, 3000);
</script>
</body>
</html>
